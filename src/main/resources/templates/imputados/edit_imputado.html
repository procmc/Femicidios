<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Actualizar imputado</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
	<th th:insert="~{header}"></th>
</head>
<body>

	<div class = "container">
		<div class = "row">
			<div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class = "text-center"> Actualizar imputado </h1>
				<div class = "card-body">
					<form th:action="@{/imputados/{id} (id=${imputado.CI_Id})}" th:object = "${imputado}" method="POST">
						<div class ="form-group">
							<label>DNI del Imputado </label>
							<input
							type = "text"
							name = "DNI"
							th:field = "*{CVDni}"
							class = "form-control"
							placeholder="Digite el DNI del imputado"
							minlength="1"
							maxlength="50"
                            required 
							/>
						</div>
						
						<div class ="form-group">
							<label>Nombre del Imputado </label>
							<input
							type = "text"
							name = "nombre"
							th:field = "*{CVNombre}"
							class = "form-control"
							placeholder="Digite el nombre del imputado" 
							maxlength="50"
							minlength="1"
                            required 
							/>
						</div>



						<div class ="form-group">
							<label>Seleccione la identidad de genero del imputado:</label>
							<select name="identidad" th:field="*{CVGenero}" class = "form-control" onfocus="ocultarError()">
								<option th:each="identidad: ${identidadGenero}" th:value="${identidad.id}" th:text="${identidad.genero}"></option>
							</select>
						</div>

						<div class ="form-group">
							<label>Seleccione la orientacion sexual del imputado:</label>
							<select name="orientacionSexual" th:field="*{CVOrientacionSexual}" class = "form-control" onfocus="ocultarError()">
								<option th:each="orientacionSexual: ${orientacionSexual}" th:value="${orientacionSexual.CI_Codigo}" th:text="${orientacionSexual.CVTitulo}"></option>
							</select>
						</div>
						
						<div class ="form-group">
							<label>Edad del Imputado </label>
							<input
							type = "text"
							name = "Edad"
							th:field = "*{CIEdad}"
							class = "form-control"
							placeholder="Digite la edad del imputado" 
							maxlength="10"
							minlength="1"
                            required 
							/>
						</div>
						
						<div class ="form-group">
							<label>Lugar de nacimiento del Imputado </label>
							<input
							type = "text"
							name = "Lugar de nacimiento"
							th:field = "*{CVLugarNacimiento}"
							class = "form-control"
							placeholder="Digite el lugar de nacimiento del imputado" 
							maxlength="50"
							minlength="1"
                            required 
							/>
						</div>
						
						<div class ="form-group">
							<label>Codigo pais del Imputado </label>
							<input
							type = "text"
							name = "Codigo pais"
							th:field = "*{CVPais}"
							class = "form-control"
							placeholder="Digite el codigo pais del imputado" 
							maxlength="20"
							minlength="1"
                            required 
							/>
						</div>

						<div class ="form-group">
							<label>Nacionalidad del Imputado</label>
							<input
									type = "text"
									name = "nacionalidad"
									th:field = "*{CVNacionalidad}"
									class = "form-control"
									placeholder="Digite la nacionalidad del imputado"
									minlength="1"
									maxlength="50"
									required
							/>
						</div>

						<div class ="form-group">
							<label>Seleccione el nivel educativo del imputado:</label>
							<select name="educacion" th:field="*{CVEducacion}" class = "form-control" onfocus="ocultarError()">
								<option th:each="educacion: ${nivelEducativo}" th:value="${educacion.CI_Id}" th:text="${educacion.CVTitulo}"></option>
							</select>
						</div>

						<div class ="form-group">
							<label>Ocupacion del Imputado </label>
							<input
									type = "text"
									name = "ocupacion"
									th:field = "*{CVOcupacion}"
									class = "form-control"
									placeholder="Digite la ocupacion del imputado"
									minlength="1"
									maxlength="50"
									required
							/>
						</div>

						<div class ="form-group">
							<label>Domicilio del Imputado </label>
							<input
									type = "text"
									name = "domicilio"
									th:field = "*{CVDomicilio}"
									class = "form-control"
									placeholder="Digite el domicilio del imputado"
									minlength="1"
									maxlength="255"
									required
							/>
						</div>

						<div class ="form-group">
							<label>Lugar de residencia del Imputado </label>
							<input
									type = "text"
									name = "residencia"
									th:field = "*{CVLugarResidencia}"
									class = "form-control"
									placeholder="Digite la residencia del imputado"
									minlength="1"
									maxlength="50"
									required
							/>
						</div>

						<div class ="form-group">
							<label>Condicion migratoria del Imputado </label>
							<input
									type = "text"
									name = "condicion"
									th:field = "*{CVCondicionMigratoria}"
									class = "form-control"
									placeholder="Digite el status migratorio del imputado"
									minlength="1"
									maxlength="50"
									required
							/>
						</div>

						<div class ="form-group">
							<label>Etnia del Imputado </label>
							<input
									type = "text"
									name = "etnia"
									th:field = "*{CVEtnia}"
									class = "form-control"
									placeholder="Digite la etnia del imputado"
									minlength="1"
									maxlength="50"
									required
							/>
						</div>
						<div class ="form-group">
							<label>Seleccione la situacion juridica del imputado:</label>
							<select name="situacionJuridica" th:field="*{CVSituacionJuridica}" class = "form-control" onfocus="ocultarError()">
								<option th:each="situacion: ${situacionJuridica}" th:value="${situacion.CI_Codigo}" th:text="${situacion.CVTitulo}"></option>
							</select>
						</div>

						<div class ="form-group">
							<label>Estado conyugal del Imputado </label>
							<input
									type = "text"
									name = "estado"
									th:field = "*{CVEstadoConyugal}"
									class = "form-control"
									placeholder="Digite el estado conyugal del imputado"
									minlength="1"
									maxlength="50"
									required
							/>
						</div>

						<div class ="form-group ">
							<label>Posee permiso de portacion de armas?</label>
							<select name="PermisoPortacionArmas" th:field="*{CVPermisoPortacionArmas}"onfocus="ocultarError()" class="form-control">
								<option value="SI">SI</option>
								<option value="NO">NO</option>
							</select>
						</div>

						<div class ="form-group ">
							<label>Pertenencia a alguna Fuerza de Seguridad?</label>
							<select name="PermisoPortacionArmas" th:field="*{CVPertenenciaFuerzaSeguridad}" onfocus="ocultarError()" class="form-control">
								<option value="SI">SI</option>
								<option value="NO">NO</option>
							</select>
						</div>

						<div class ="form-group ">
							<label>Posee antecedentes?</label>
							<select name="PermisoPortacionArmas" th:field="*{CVAntecedentes}"onfocus="ocultarError()" class="form-control">
								<option value="SI">SI</option>
								<option value="NO">NO</option>
							</select>
						</div>

						<div class ="form-group">
							<label>Ha tenido tentativa de suicidio?</label>
							<select name="PermisoPortacionArmas" th:field="*{CVSuicidio}"onfocus="ocultarError()" class="form-control">
								<option value="SI">SI</option>
								<option value="NO">NO</option>
							</select>
						</div>

						<div class ="form-group">
							<label>Organismo generador</label>
							<select name="generador" th:field="*{CVGenerador}" class = "form-control" onfocus="ocultarError()">
								<option th:each="organismo: ${listaOrganismo}" th:value="${organismo.CI_Id}" th:text="${organismo.CI_Id} + ' - ' + ${organismo.CVNombre}"></option>
							</select>
						</div>
						
						<div class = "box-footer">
							<button type="submit" class = "btn btn-primary">
								Actualizar datos
							</button>
						</div>
					</form>
				
				</div>
			</div>
		</div>
	</div>
</body>
</html>
