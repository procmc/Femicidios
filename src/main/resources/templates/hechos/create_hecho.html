<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="ISO-8859-1">
    <title>Hecho mantenimiento</title>
    <script th:src="@{/HechoScripts/HechoScript.js}"></script>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
    <th th:insert="~{header}"></th>
</head>
<body>

<br>
<br>

<div class = "container">
    <div class = "row">
        <div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
            <h1 class = "text-center">Crear Hecho</h1>
            <div class = "card-body">
                <form th:action="@{/hechos}" th:object = "${hecho}" method="POST">

                    <div class ="form-group">
                        <label>Selecciona el tipo de victima del hecho:</label>
                        <select th:name="tipoVictima" th:field="*{CITipoVictima}" class = "form-control" onfocus="ocultarError()">
                            <option th:each="tipoVictima: ${tipoVictima}" th:value="${tipoVictima.CI_Codigo}" th:text="${tipoVictima.CI_Codigo} + ' - ' + ${tipoVictima.CVTitulo}"></option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Selecciona el tipo de relacion del hecho:</label>
                        <select th:name="tipoRelacion" th:field="*{CITipoRelacion}" class = "form-control" onfocus="ocultarError()">
                            <option th:each="tipoRelacion: ${tipoRelacion}" th:value="${tipoRelacion.CI_Codigo}"
                                    th:text="${tipoRelacion.CI_Codigo} + ' - ' + ${tipoRelacion.CVTitulo}"></option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Selecciona la modalidad del hecho:</label>
                        <select th:name="modalidad" th:field="*{CIModalidad}" class = "form-control" onfocus="ocultarError()">
                            <option th:each="modalidad: ${modalidad}" th:value="${modalidad.CI_Codigo}" th:text="${modalidad.CI_Codigo} + ' - ' + ${modalidad.CVTitulo}"></option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Selecciona la id de la victima:</label>
                        <select name="victima" th:field="*{CIIdVictima}" class = "form-control" onfocus="ocultarError()">
                            <option th:each="victima: ${victima}" th:value="${victima.CI_Id}" th:text="${victima.CI_Id} + ' - ' + ${victima.CVDNI}"></option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Selecciona la id del proceso judicial:</label>
                        <select name="proceso" th:field="*{CIIdProceso}" class = "form-control" onfocus="ocultarError()">
                            <option th:each="proceso: ${proceso}" th:value="${proceso.CI_Id}" th:text="${proceso.CI_Id} + ' - ' + ${proceso.CIDenunciante}"></option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Pais del hecho</label>
                        <input
                                type = "text"
                                name = "pais"
                                th:field = "*{CIPais}"
                                class = "form-control"
                                pattern="[0-9]{1,4}"
                                maxlength="4"
                                required
                                placeholder="Digite el Codigo del pais del hecho"
                                onfocus="ocultarError()"
                        />
                    </div>

                    <div class ="form-group">
                        <label>Seleccione si hubo agresion sexual:</label>
                        <select name="agresionSexual" th:field="*{CVAgresionSexual}" class = "form-control" onfocus="ocultarError()">
                            <option value="SI"> Si </option>
                            <option value="NO"> No </option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Seleccione si hubo denuncia previa:</label>
                        <select name="denunciaPrevia" th:field="*{CVDenunciaPrevia}" class = "form-control" onfocus="ocultarError()">
                            <option value="SI"> Si </option>
                            <option value="NO"> No </option>
                        </select>
                    </div>

                    <div class ="form-group">
                        <label>Selecciona el organismo generador de datos:</label>
                        <select name="proceso" th:field="*{CIIdGenerador}" class = "form-control" onfocus="ocultarError()">
                            <option th:each="organismo: ${organismo}" th:value="${organismo.CI_Id}" th:text="${organismo.CI_Id} + ' - ' + ${organismo.CVNombre}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label> Fecha</label>
                        <input th:field = "*{CDFecha}" type="datetime-local" name="">
                    </div>

                    <div class ="form-group">
                        <label>Detalles</label>
                        <input
                                type = "text"
                                name = "detalles"
                                th:field = "*{CVDetalles}"
                                class = "form-control"
                                maxlength="255"
                                placeholder="Digite algun detalle del hecho"
                                onfocus="ocultarError()"
                        />
                    </div>

                    <div id="error-message" th:if="${error}" class="alert alert-danger" role="alert">
                        <p th:text="${error_message}"></p>
                    </div>

                    <div class = "box-footer">
                        <button type="submit" class = "btn btn-primary">
                            Agregar
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
