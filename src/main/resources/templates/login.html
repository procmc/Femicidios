<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Inicio de sesión</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(to bottom, black, white);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        .card {
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center" style="height: 80vh;">
        <div class="col-md-5">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h1 class="mb-0">Inicio de sesión</h1>
                </div>
                <div class="card-body">
                    <form th:action="@{/login}" method="post">
                        <div th:if="${param.error}">
                            <div class="alert alert-danger">Usuario o contraseña inválidos</div>
                        </div>
                        <div th:if="${param.logout}">
                            <div class="alert alert-info">Ha cerrado sesión exitosamente</div>
                        </div>
                        <div class="form-group">
                            <label for="username">Nombre de usuario:</label>
                            <input id="username" name="username" type="text" class="form-control" required autofocus="autofocus" placeholder="Digite su Usuario">
                        </div>
                        <div class="form-group">
                            <label for="password">Contraseña:</label>
                            <input id="password" type="password" name="password" class="form-control" required autofocus="autofocus" placeholder="Digite su Contraseña" maxlength="60">
                        </div>
                        <div class="form-group text-center">
                            <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
