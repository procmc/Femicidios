<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Actualizar perfil</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
	<!--    <th th:include="header" th:fragment="header"></th>-->
    <th th:insert="~{header}"></th>
</head>
<body>
<div class="row">
		<div class="col-md-12">
			<ul class="nav nav-pills flex-column flex-sm-row">
				<li class="nav-item">
					<a class="nav-link active" href="#">Inicio</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/perfiles}">Perfiles</a>
				</li>
		
			</ul>
		</div>
	</div>
<br>
<br>
	<div class = "container">
		<div class = "row">
			<div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class = "text-center"> Actualizar perfil </h1>
				<div class = "card-body">
					<form th:action="@{/perfiles/{id} (id=${perfil.CI_Id})}" th:object = "${perfil}" method="POST">
						<div class ="form-group">
							<label>Descripcion del perfil</label>
							<input
							type = "text"
							name = "Descripcion"
							th:field = "*{CVDescripcion}"
							class = "form-control"
							placeholder="Digite la descripcion del perfil" 
							/>
						</div>
						
						<div class ="form-group">	
						<label for="roles">Selecciona el Rol:</label>
  							<select id="roles" name="roles" th:field = "*{CVRol}" class="btn btn-info dropdown-toggle">
   						 		<option value="Administrador">Administrador</option>
    							<option value="Convencional">Convencional</option>
    							<option value="Consulta">Consulta</option>
  							</select>
  						</div>
						
						<div class = "box-footer">
							<button type="submit" class = "btn btn-primary">
								Actualizar datos
							</button>
						</div>
					</form>
				
				</div>
			</div>
		</div>
	</div>
</body>
</html>
