<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Actualizar usuario</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
	<!--    <th th:include="header" th:fragment="header"></th>-->
    <th th:insert="~{header}"></th>
</head>
<body>
<div class="row">
		<div class="col-md-12">
			<ul class="nav nav-pills flex-column flex-sm-row">
				<li class="nav-item">
					<a class="nav-link active" href="#">Inicio</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/usuarios}">Usuarios</a>
				</li>
		
			</ul>
		</div>
	</div>
<br>
<br>
	<div class = "container">
		<div class = "row">
			<div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class = "text-center"> Actualizar usuario </h1>
				<div class = "card-body">
					<form th:action="@{/usuarios/{id} (id=${usuario.CI_Id})}" th:object = "${usuario}" method="POST">
					
					
					<div class ="form-group">
							<label>Cedula </label>
							<input
							type = "text"
							name = "cedula"
							th:field = "*{CVCedula}"
							class = "form-control"
							placeholder="Digite la Cedula del usuario" 
							value=""
							autocomplete="off"
							maxlength="20"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Nombre del usuario</label>
							<input
							type = "text"
							name = "nombre"
							th:field = "*{CVNombre}"
							class = "form-control"
							placeholder="Digite el nombre del usuario" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Apellidos del usuario</label>
							<input
							type = "text"
							name = "apellidos"
							th:field = "*{CVApellidos}"
							class = "form-control"
							placeholder="Digite los apellidos del Usuario" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">	
						<label for="roles">Selecciona el Perfil:</label>
  							<select id="perfil" name="perfil" th:field = "*{CIPerfil}" class="btn btn-info dropdown-toggle">
   						 		<option value="1">Administrador</option>
    							<option value="2">Convencional</option>
    							<option value="3">Consulta</option>
  							</select>
  						</div>
						
					  <div class="form-group">
					  <label for="clave">Contraseï¿½a del usuario</label>
					  <input
					    type="password"
					    name="Clave"
					    th:field="*{TCClave}"
					    class="form-control"
					    id="clave"
					    placeholder="Ingrese la Contraseï¿½a"
					    pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}$"
					    title="La contraseï¿½a debe tener al menos 8 caracteres, incluyendo al menos un nï¿½mero, una letra mayï¿½scula, una letra minï¿½scula y un carï¿½cter especial como !@#$%^&*"
					    required
					  />
					</div>
						
						
						<div class = "box-footer">
							<button type="submit" class = "btn btn-primary">
								Actualizar datos
							</button>
						</div>
					</form>
				
				</div>
			</div>
		</div>
	</div>
</body>
</html>
