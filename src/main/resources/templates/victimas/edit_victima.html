<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Actualizar Victima</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
	<!--    <th th:include="header" th:fragment="header"></th>-->
    <th th:insert="~{header}"></th>
</head>
<body>

<br>
	<div class = "container">
		<div class = "row">
			<div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class = "text-center"> Actualizar victima </h1>
				<div class = "card-body">
					<form th:action="@{/victima/{id} (id=${victima.CI_Id})}" th:object = "${victima}" method="POST">
					
					<div class ="form-group">
						<label>Cedula</label>
							<input
							type = "text"
							name = "cedula"
							th:field = "*{CVDNI}"
							class = "form-control"
							placeholder="Digite la cedula de la victima" 
							maxlength="10"
                   		 	required
							/>
						</div>
						
					
						<div class ="form-group">
							<label>Nombre </label>
							<input
							type = "text"
							name = "nombre"
							th:field = "*{CVNombre}"
							class = "form-control"
							placeholder="Digite el nombre de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Apellido Paterno</label>
							<input
							type = "text"
							name = "apellidoPaterno"
							th:field = "*{CVApellidoPaterno}"
							class = "form-control"
							placeholder="Digite el apellido Paterno de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Apellido Materno</label>
							<input
							type = "text"
							name = "apellidoMaterno"
							th:field = "*{CVApellidoMaterno}"
							class = "form-control"
							placeholder="Digite el apellido Materno de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Edad</label>
							<input
							type = "text"
							name = "Edad"
							th:field = "*{CVEdad}"
							class = "form-control"
							placeholder="Edad de la victima" 
							maxlength="10"
                   		 	required
							/>
						</div>
		
						
					<div class ="form-group"> 
							<label>Identidad de Genero</label>
							<select th:field="*{CVGenero}">
   							 	<option th:value="'1'" th:text="CisHombre"></option>
  							 	 <option th:value="'2'" th:text="CisMujer"></option>
  							 	 <option th:value="'3'" th:text="NoBinario"></option>
  							 	 <option th:value="'4'" th:text="Otro"></option>
  							 	  <option th:value="'5'" th:text="SeDesconoce"></option>
  							 	   <option th:value="'6'" th:text="MujerTrans"></option>
  							 	    <option th:value="'7'" th:text="HombreTrans"></option>
  							 	   
							</select>
						</div>
							
						
						<div class ="form-group">
							<label>Lugar de Nacimiento</label>
							<input
							type = "text"
							name = "Lugar de Nacimiento"
							th:field = "*{CVLugarNac}"
							class = "form-control"
							placeholder="Lugar de nacimiento de la victima" 
							maxlength="100"
                   		 	required
							/>
						</div>
							<div class ="form-group"> 
								<label>Orientacion Sexual</label>
							<select th:field="*{CVOrientaSex}">
   							 	<option th:value="'1'" th:text="Lesbiana"></option>
  							 	 <option th:value="'2'" th:text="Gay"></option>
  							 	 <option th:value="'3'" th:text="Heterosexual"></option>
  							 	 <option th:value="'4'" th:text="Bisexual"></option>
  							 	  <option th:value="'5'" th:text="Asexual"></option>
  							 	   <option th:value="'6'" th:text="Otro"></option>
  							 	   
  							 	   
							</select>
						</div>
							
						<div class ="form-group">
							<label>Nacionalidad</label>
							<input
							type = "text"
							name = "nacionalidad"
							th:field = "*{CVNacionalidad}"
							class = "form-control"
							placeholder="Digite la nacionalidad de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group"> 
								<label>Educación</label>
							<select th:field="*{CVOrientaSex}">
   							 	<option th:value="'1'" th:text="Primera Infancia"></option>
  							 	<option th:value="'2'" th:text="Preescolar"></option>
  							 	<option th:value="'3'" th:text="Primaria"></option>
  							 	<option th:value="'4'" th:text="Secundaria baja"></option>
  							 	<option th:value="'5'" th:text="Secundaria alta"></option>
  							    <option th:value="'6'" th:text="Postsecundaria no terciaria"></option>
  							    <option th:value="'3'" th:text="Terciaria"></option>
  							 	<option th:value="'4'" th:text="Grado"></option>
  							 	<option th:value="'5'" th:text="Maestria"></option>
  							    <option th:value="'6'" th:text="Doctorado"></option>  
  							    <option th:value="'6'" th:text="Se desconoce"></option>   
							</select>
						</div>
						
						<div class ="form-group">
							<label>Ocupación</label>
							<input
							type = "text"
							name = "Ocupacion"
							th:field = "*{CVOcupacion}"
							class = "form-control"
							placeholder="Digite la ocupacion de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Domicilio</label>
							<input
							type = "text"
							name = "domicilio"
							th:field = "*{CVDomicilio}"
							class = "form-control"
							placeholder="Digite el domicilio de la victima" 
							maxlength="100"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Lugar de residencia</label>
							<input
							type = "text"
							name = "lugarResidencia"
							th:field = "*{CVLugarResidencia}"
							class = "form-control"
							placeholder="Digite el lugar de residencia de la victima" 
							maxlength="100"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Discapacidad</label>
							<input
							type = "text"
							name = "discapacidad"
							th:field = "*{CVDiscapacidad}"
							class = "form-control"
							placeholder="Digite si la victima tiene alguna discapacidad" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Condicion migratoria</label>
							<input
							type = "text"
							name = "condicionMigratoria"
							th:field = "*{CVCondicionMigratoria}"
							class = "form-control"
							placeholder="Digite la condicion migratoria de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Etnia</label>
							<input
							type = "text"
							name = "etnia"
							th:field = "*{CVEtnia}"
							class = "form-control"
							placeholder="Digite la etnia de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Medidas de protección</label>
							<input
							type = "text"
							name = "medidasProteccion"
							th:field = "*{CVMedidasProteccion}"
							class = "form-control"
							placeholder="Digite las medidas de proteccion de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Denuncias previas</label>
							<input
							type = "text"
							name = "denunciaPrevias"
							th:field = "*{CVDenunciasPrevias}"
							class = "form-control"
							placeholder="Digite si la victima posee denuncias previas" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group"> 
								<label>Hijos</label>
							<select th:field="*{CIHijos}">
   							 	<option th:value="'1'" th:text="Si"></option>
  							 	<option th:value="'2'" th:text="No"></option>
  							 	</select>
						</div>
						
						<div class ="form-group">
							<label>Generador</label>
							<input
							type = "text"
							name = "generador"
							th:field = "*{CVGenerador}"
							class = "form-control"
							placeholder="Digite información para identificar al organismo que genera los datos de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
							
						
						<div class = "box-footer">
							<button type="submit" class = "btn btn-primary" data-toggle="modal" data-target="#exampleModal">
								Actualizar
							</button>
							
							<div class="modal fade" id="exampleModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        ...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>
							
							
						</div>
					</form>
				
				</div>
			</div>
		</div>
	</div>
</body>
</html>
