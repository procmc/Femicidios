<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Victima mantenimiento</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
	<!--    <th th:include="header" th:fragment="header"></th>-->
    <th th:insert="~{header}"></th>
</head>
<body>

<br>
	<div class = "container">
		<div class = "row">
			<div class ="col-lg-8 col-md-8 col-sm-8 container justify-content-center card">
				<h1 class = "text-center">Registrar Victima</h1>
				<div class = "card-body">
					<form th:action="@{/victima}" th:object = "${victima}" method="POST">
						<div class ="form-group">
							
							
							
							<div class ="form-group">
						<label>Cedula</label>
							<input
							type = "text"
							name = "cedula"
							th:field = "*{CVDNI}"
							class = "form-control"
							placeholder="Digite la cedula de la victima" 
							maxlength="10"
                   		 	required
							/>
						</div>
						
					
						<div class ="form-group">
							<label>Nombre </label>
							<input
							type = "text"
							name = "nombre"
							th:field = "*{CVNombre}"
							class = "form-control"
							placeholder="Digite el nombre de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Apellido Paterno</label>
							<input
							type = "text"
							name = "apellidoPaterno"
							th:field = "*{CVApellidoPaterno}"
							class = "form-control"
							placeholder="Digite el apellido Paterno de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Apellido Materno</label>
							<input
							type = "text"
							name = "apellidoMaterno"
							th:field = "*{CVApellidoMaterno}"
							class = "form-control"
							placeholder="Digite el apellido Materno de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Edad</label>
							<input
							type = "text"
							name = "Edad"
							th:field = "*{CVEdad}"
							class = "form-control"
							placeholder="Edad de la victima" 
							maxlength="10"
                   		 	required
							/>
						</div>
		
						
						<div class ="form-group">
							<label>Seleccione la identidad de genero de la victima:</label>
							<select name="identidad" th:field="*{CVGenero}" class = "form-control" onfocus="ocultarError()">
								<option th:each="identidad: ${identidadGenero}" th:value="${identidad.Id}" th:text="${identidad.nombre}"></option>
							</select>
						</div>
		
		
		
		
						<div class ="form-group">
							<label>Seleccione la orientacion sexual de la victima:</label>
							<select name="orientacion_sexual" th:field="*{CVOrientaSex}" class = "form-control" onfocus="ocultarError()">
								<option th:each="orientacionSexual: ${orientacionSexual}" th:value="${orientacionSexual.CI_Codigo}" th:text="${orientacionSexual.CVTitulo}"></option>
							</select>
						</div>
						
							
						
						<div class ="form-group">
							<label>Lugar de Nacimiento</label>
							<input
							type = "text"
							name = "Lugar de Nacimiento"
							th:field = "*{CVLugarNac}"
							class = "form-control"
							placeholder="Lugar de nacimiento de la victima" 
							maxlength="100"
                   		 	required
							/>
						</div>
						
						
							
						<div class ="form-group">
							<label>Nacionalidad</label>
							<input
							type = "text"
							name = "nacionalidad"
							th:field = "*{CVNacionalidad}"
							class = "form-control"
							placeholder="Digite la nacionalidad de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						

         <div class ="form-group">
							<label>Seleccione el nivel educativo de la victima:</label>
							<select name="educacion" th:field="*{CIEducacion}" class = "form-control" onfocus="ocultarError()">
								<option th:each="educacion: ${nivelEducativo}" th:value="${educacion.CI_Id}" th:text="${educacion.CVTitulo}"></option>
							</select>
						</div>
						
						<div class ="form-group">
							<label>Ocupación</label>
							<input
							type = "text"
							name = "Ocupacion"
							th:field = "*{CVOcupacion}"
							class = "form-control"
							placeholder="Digite la ocupacion de la victima" 
							maxlength="50"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Domicilio</label>
							<input
							type = "text"
							name = "domicilio"
							th:field = "*{CVDomicilio}"
							class = "form-control"
							placeholder="Digite el domicilio de la victima" 
							maxlength="100"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Lugar de residencia</label>
							<input
							type = "text"
							name = "lugarResidencia"
							th:field = "*{CVLugarResidencia}"
							class = "form-control"
							placeholder="Digite el lugar de residencia de la victima" 
							maxlength="100"
                   		 	required
							/>
						</div>
						
						<div class ="form-group">
							<label>Discapacidad</label>
						
						<select th:field="*{CVDiscapacidad}">
   							 	<option value="Visual">Visual</option>
   							 	<option value="Auditiva">Auditiva</option>
   							 	<option value="Motriz">Motriz</option>
   							 		<option value="Multiple">Multiple</option>
   							 	<option value="Intelectual">Intelectual</option>
   							 	<option value="Fisica">Fisica</option>
   							 	<option value="Otro">Otro</option>
   							 
  							 
  							 	</select>
						</div>
						
						<div class ="form-group">
							<label>Condicion migratoria</label>
						
							<select th:field="*{CVCondicionMigratoria}">
   							 	<option value="REGULAR">Regular</option>
   							 	<option value="IRREGULAR">Irregular</option>
   							 	<option value="REFUGIADO">Refugiado</option>
   							 	<option value="APATRIDA">Apatrida</option>
   							 	<option value="OTRO">Otro</option>
   							 
  							 
  							 	</select>
							
						</div>
						
						<div class ="form-group">
							<label>Etnia</label>
							<select th:field="*{CVEtnia}">
   							 	<option value="Asiatico">Asiatico</option>
   							 	<option value="Blanco">Blanco</option>
   							 	<option value="Negro">Negro</option>
   							 	<option value="Indigena">Indigena</option>
   							 	<option value="Se desconoce">Se desconoce</option>
   							 
  							 
  							 	</select>
						</div>
						
						<div class ="form-group">
							<label>Medidas de protección</label>
							
							<select th:field="*{CVMedidasProteccion}">
   							 	<option value="SI" >SI</option>
  							 	<option value="NO">No</option>
  							 	</select>
						</div>
						
						<div class ="form-group">
							<label>Denuncias previas</label>
							
							
							
							<select th:field="*{CVDenunciasPrevias}">
   							 	<option value="SI" >SI</option>
  							 	<option value="NO">No</option>
  							 	</select>
						</div>
							
						
						
						<div class ="form-group"> 
								<label>Hijos</label>
							<select th:field="*{CIHijos}">
   							 	<option value="1">1</option>
   							 	<option value="2">2</option>
   							 	<option value="3">3</option>
   							 	<option value="4">4</option>
   							 	<option value="5">5</option>
   							 	<option value="6">6</option>
   							 	<option value="7">7</option>
   							 	<option value="8">8</option>
   							 	<option value="9">9</option>
   							 	<option value="10">10</option>
   							 	<option value="11">11</option>
   							 	<option value="12">12</option>
  							 
  							 	</select>
						</div>
						
					<div class ="form-group">
							<label>Organismo generador</label>
							<select name="generador" th:field="*{CVGenerador}" class = "form-control" onfocus="ocultarError()">
								<option th:each="organismo: ${listaOrganismo}" th:value="${organismo.CI_Id}" th:text="${organismo.CI_Id} + ' - ' + ${organismo.CVNombre}"></option>
							</select>
						</div>
						
						
						
						
						
						
						
						
						
						<div class = "box-footer">
							<button type="submit" class = "btn btn-primary">
								Agregar
							</button>
						</div>
					</form>
				
				</div>
			</div>
		</div>
	</div>
</body>
</html>
