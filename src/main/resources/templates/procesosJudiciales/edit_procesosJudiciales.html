	<div class = "container">
		<div class = "row">
			<div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class = "text-center"> Actualizar proceso judicial </h1>
				<div class = "card-body">
					<form th:action="@{/procesosJudiciales/{id} (id=${procesoJudicial.CI_Id})}" th:object = "${procesoJudicial}" method="POST">
						<div class ="form-group">
							<label>Estado del proceso judicial</label>
							<input
							type = "text"
							name = "estado"
							th:field = "*{CVEstado}"
							class = "form-control"
							placeholder="Digite el estado del proceso judicial" 
							maxlength="50"
                    		required 
							/>
						</div>
						
						<div class ="form-group">
							<label>DNI del denunciante</label>
							<input
							type = "number"
							name = "denunciante"
							th:field = "*{CIDenunciante}"
							class = "form-control"
							placeholder="Digite DNI del denunciante" 
							maxlength="10"
							pattern="[0-9]"
                    		required 
							/>
						</div>
						
						<div class ="form-group">
							<label>Personas imputadas</label>
							<input
							type = "number"
							name = "imputados"
							th:field = "*{CIPersonasImputadas}"
							class = "form-control"
							placeholder="Cantidad de personas imputadas" 
							maxlength="10"
							pattern="[0-9]"
                    		required 
							/>
						</div>
						
						<div class ="form-group">
							<label>Agravantes</label>
							<input
							type = "text"
							name = "agravantes"
							th:field = "*{CVAgravantes}"
							class = "form-control"
							placeholder="Agravantes del caso" 
							maxlength="50"
                    		required
							/>
						</div>
						
						<div class ="form-group">
							<label>Partes</label>
							<input
							type = "text"
							name = "partes"
							th:field = "*{CVPartes}"
							class = "form-control"
							placeholder="Partes intervenientes" 
							maxlength="20"
                    		required 
							/>
						</div>
						
						<div class ="form-group">
							<label>Tipo de delito</label>
							<input
							type = "text"
							name = "tipoDelito"
							th:field = "*{CVTipoDelito}"
							class = "form-control"
							placeholder="Tipo de delito" 
							maxlength="30"
                    		required
							/>
						</div>
						
						<div class = "box-footer">
							<button type="submit" class = "btn btn-primary">
								Actualizar datos
							</button>
						</div>
					</form>
				
				</div>
			</div>
		</div>
	</div>
</body>
</html>
