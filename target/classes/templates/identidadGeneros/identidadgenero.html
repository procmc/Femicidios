<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta charset="ISO-8859-1">
<title>Identidad de Genero</title>
<th th:insert="~{header}"></th>

<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
</head>
<body>
	<div class="row">
		<div class="col-md-12">
			<a th:href="@{/identidadgenero/new}" class="btn btn-primary btn-lg">
				Agregar Identidad Genero</a>

			<div class="row">
				<h1></h1>
			</div>
			<div class="row">
				<h1></h1>
			</div>
			<table class="table table-striped table-sm">
				<tr>
					<th>Nombre</th>
					<th>Descripcion</th>
					<!-- 
					<th>Genero</th>
					<th> País</th>
					 -->
					<th>Acciones</th>
				</tr>

				<tbody>
					<tr th:each="identidadgenero,iterStat : ${identidadgenero}">
						<td th:text="${identidadgenero.nombre}"></td>
						<td th:text="${identidadgenero.descripcion}"></td>
						<!-- 
						<td th:text="${generos[iterStat.index].nombre}"></td>
						<td th:text="${paises[iterStat.index].spanish}"></td>
						 -->


						<td><a
							th:href="@{/identidadgenero/edit/{id}(id=${identidadgenero.Id})}"
							class="btn btn-primary">Actualizar</a> <a
							th:href="@{/identidadgenero/{id}(id=${identidadgenero.Id})}"
							class="btn btn-danger">Eliminar</a>
					</tr>

				</tbody>

			</table>
		</div>
	</div>

</body>
</html>
