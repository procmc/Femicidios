<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" 
integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
 crossorigin="anonymous">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualizar usuario</title>

</head>
<body>
	<div class="row">
		<div class="col-md-12">
			<ul class="nav nav-pills flex-column flex-sm-row">
				<li class="nav-item"><a class="nav-link active" href="#">Inicio</a>
				</li>
				<li class="nav-item"><a class="nav-link"
					th:href="@{/identidadgenero}">Editar Identidad</a></li>

			</ul>
		</div>
	</div>
	<br>
	<br>
	<div class="container">
		<div class="row">
			<div
				class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class="text-center">Actualizar Identidad Genero</h1>
				<div class="card-body">
					<form
						th:action="@{/identidadgenero/{id} (id=${identidadgenero.Id})}"
						th:object="${identidadgenero}" method="POST">
						<div class="form-floating mb-3">
							
							<input type="text"
								name="cedula" id="floatingInput" th:field="*{nombre}" class="form-control"
								placeholder="Digite el numero de la cedula" />
								 <label for="floatingInput">Nombre</label>
						</div>
						<div class="form-floating">
							<input type="text"
								name="descripcion" th:field="*{descripcion}" class="form-control" id="floating-postal"
								placeholder="Digite la descripcion" />
								<label for="floating-postal">Descripción </label> 
						</div>
						<!-- 
						<div class="form-group row">
							<label class="col-md-2" for="pais">Generos :</label> <select
								th:field="*{genero}" class="form-control-sm col-md-6"
								id="genero">
								<option th:each="genero:${generos}" th:value="${genero.id}"
									th:text="${genero.nombre}" />
							</select>
						</div>
						 -->
<!-- 

	                  <div class="form-group row">
							<label class="col-md-2" for="pais">Países:</label> <select th:field="*{codigoPais}" 
								class="form-control-sm col-md-6" id="pais">
								<option th:each="pais:${paises}" th:value="${pais.Id}"
									th:text="${pais.spanish}" />
							</select>
						</div>
 -->
				

						<div class="box-footer">
							<button type="submit" class="btn btn-primary">
								Actualizar datos</button>
						</div>
					</form>
					

				</div>
			</div>
		</div>
	</div>
</body>
</html>
