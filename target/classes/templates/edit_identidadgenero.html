<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualizar usuario</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
</head>
<body>
	<div class="row">
		<div class="col-md-12">
			<ul class="nav nav-pills flex-column flex-sm-row">
				<li class="nav-item"><a class="nav-link active" href="#">Inicio</a>
				</li>
				<li class="nav-item"><a class="nav-link"
					th:href="@{/identidadgenero}">Usuarios</a></li>

			</ul>
		</div>
	</div>
	<br>
	<br>
	<div class="container">
		<div class="row">
			<div
				class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<h1 class="text-center">Actualizar usuario</h1>
				<div class="card-body">
					<form
						th:action="@{/identidadgenero/{id} (id=${identidadgenero.Id})}"
						th:object="${identidadgenero}" method="POST">
						<div class="form-group">
							<label>Cedula del Usuario </label> <input type="text"
								name="cedula" th:field="*{cedula}" class="form-control"
								placeholder="Digite el numero de la cedula" />
						</div>

						<div class="form-group row">
							<label class="col-md-2" for="pais">Generos :</label> <select
								th:field="*{genero}" class="form-control-sm col-md-6"
								id="genero">
								<option th:each="genero:${generos}" th:value="${genero.id}"
									th:text="${genero.nombre}" />
							</select>
						</div>

					<div class="form-group row">
							<label class="col-md-2" for="pais">Países:</label> <select th:field="*{codigoPais}" 
								class="form-control-sm col-md-6" id="pais">
								<option th:each="pais:${paises}" th:value="${pais.Id}"
									th:text="${pais.spanish}" />
							</select>
						</div>

						<div class="box-footer">
							<button type="submit" class="btn btn-primary">
								Actualizar datos</button>
						</div>
					</form>
					

				</div>
			</div>
		</div>
	</div>
</body>
</html>
