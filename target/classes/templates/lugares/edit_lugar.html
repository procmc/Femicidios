<div class = "container">
  <div class = "row">
    <div class ="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
      <h1 class = "text-center"> Actualizar Lugar </h1>
      <div class = "card-body">
        <form th:action="@{/lugar/{id} (id=${lugar.CI_Codigo})}" th:object = "${lugar}" method="POST">
          <div class="form-group">
            <label>id Hecho </label>
            <input
                    type="text"
                    name="CI_Hecho"
                    th:field="*{CIHecho}"
                    class="form-control"
                    placeholder="Digite el idHecho"
                    readonly/>
          </div>

          <div class="form-group">
            <label>Descripcion</label>
            <input
                    type="text"
                    name="descripcion"
                    th:field="*{CV_Descripcion}"
                    class="form-control"
                    placeholder="Ingrese una descripcion"
                    maxlength="100"
                    required />
          </div>





          <div class="form-group">
            <label>Tipo de Lugar:</label>
            <select name="CI_Tipo_Lugar" style="display: block;" class = "form-control">
              <option value="" selected disabled >Selecciona un tipo de lugar</option>
              <option
                      th:each= "tipolugar: ${tipoLugar}"
                      th:text= ${tipolugar.CVTitulo}
                      th:value="${tipolugar.CI_Codigo}"
                      th:field="*{CI_Tipo_Lugar}" >
              </option>
            </select>
          </div>



          <div class="form-group">
            <label>Direccion</label>
            <input
                    type="text"
                    name="direccion"
                    th:field="*{CV_Direccion}"
                    class="form-control"
                    placeholder="Ingrese la Direccion"
                    maxlength="100"
                    required />
          </div>



          <div class="form-group">
            <label>Ciudad</label>
            <input
                    type="text"
                    name="ciudad"
                    th:field="*{CV_Ciudad}"
                    class="form-control"
                    placeholder="Ingrese una ciudad"
                    maxlength="50"
                    required />
          </div>


          <div class="form-group">
            <label>Pais</label>
            <input
                    type="text"
                    name="pais"
                    th:field="*{CI_Pais}"
                    pattern="[0-9]{1,4}"
                    class="form-control"
                    placeholder="Ingrese el codigo del pais" 
                    maxlength="10"
                    required/>
          </div>

          <div class = "box-footer">
            <button type="submit" class = "btn btn-primary">
              Actualizar datos
            </button>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
</body>
