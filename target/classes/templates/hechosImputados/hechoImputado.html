<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="ISO-8859-1">
  <title>HechoImputado</title>

  <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
        crossorigin="anonymous">
  <!--    <th th:include="header" th:fragment="header"></th>-->
  <th th:insert="~{header}"></th>

</head>

<body>

<div class="container-fluid">

  <div class="alert alert-primary" role="alert">
    Hechos - Imputados
  </div>

  <div class="row">
    <div class="col-md-12">

<!--      <a th:href = "@{/hechoimputado/new}" class = "btn btn-primary btn-lg"> Agregar HechoImputado</a>-->

      <div class = "row"> <h1></h1> </div>
      <div class = "row"> <h1></h1> </div>

      <table class="table table-striped table-sm">
        <tr>
          <th> Hechos </th>
          <th> Imputados </th>

          <th> Acciones </th>

        </tr>

        <tbody>
        <tr th:each = "hechoImputado: ${hechoImputado}">
          <td th:text = "${hechoImputado.CIHecho}"></td>
          <td th:text = "${hechoImputado.CIImputado}"></td>
          <td>

          <a th:href = "@{/hechoimputado/{id}(id=${hechoImputado.CI_Id})}"
             class = "btn btn-danger">Eliminar</a>

            <a th:href = "@{/hechoimputado/edit/{id}(id=${hechoImputado.CI_Id})}"
               class = "btn btn-primary">Actualizar</a>

          </td>
        </tr>
        </tbody>

      </table>

    </div>
  </div>
</div>
</body>

</html>
